<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
<title id="title">Architecture Cloudflare Tunnel</title>
<desc id="desc">Browser to Cloudflare to cloudflared to local application</desc>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
  <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
</defs>
<rect width="1200" height="360" rx="28" fill="#f8fafc"/>
<g font-family="Inter,Segoe UI,Arial,sans-serif">
  <text x="60" y="52" font-size="30" font-weight="800" fill="#0f172a">Chemin d’une requête publique</text>
  <text x="60" y="84" font-size="18" fill="#475569">Le port local n’est pas ouvert depuis Internet : cloudflared maintient une connexion sortante.</text>
  <g transform="translate(55 130)">
    <rect width="190" height="105" rx="18" fill="url(#card)" stroke="#cbd5e1"/>
    <text x="95" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Navigateur</text>
    <text x="95" y="73" text-anchor="middle" font-size="15" fill="#64748b">https://app...</text>
  </g>
  <line x1="255" y1="183" x2="405" y2="183" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(420 130)">
    <rect width="220" height="105" rx="18" fill="#fff7ed" stroke="#fdba74"/>
    <text x="110" y="43" text-anchor="middle" font-size="22" font-weight="800" fill="#9a3412">Cloudflare Edge</text>
    <text x="110" y="73" text-anchor="middle" font-size="15" fill="#9a3412">DNS • HTTPS • route</text>
  </g>
  <line x1="650" y1="183" x2="800" y2="183" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(815 130)">
    <rect width="170" height="105" rx="18" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="85" y="43" text-anchor="middle" font-size="22" font-weight="800" fill="#1e40af">cloudflared</text>
    <text x="85" y="73" text-anchor="middle" font-size="15" fill="#1e40af">connexion sortante</text>
  </g>
  <line x1="995" y1="183" x2="1110" y2="183" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(1125 130)">
    <rect width="20" height="105" rx="10" fill="#16a34a"/>
  </g>
  <g transform="translate(1030 260)">
    <rect width="130" height="50" rx="14" fill="#dcfce7" stroke="#86efac"/>
    <text x="65" y="31" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">App locale</text>
  </g>
  <path d="M900 235 C950 275 1000 285 1030 285" stroke="#16a34a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
</g>
</svg>
