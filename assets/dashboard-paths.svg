<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
<title id="title">Navigation Cloudflare Dashboard</title>
<desc id="desc">Map of dashboard navigation paths for Cloudflare Tunnel</desc>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f97316"/></marker></defs>
<rect width="1200" height="420" rx="28" fill="#fff7ed"/>
<g font-family="Inter,Segoe UI,Arial,sans-serif">
  <text x="60" y="58" fill="#7c2d12" font-size="30" font-weight="800">Où cliquer dans Cloudflare ?</text>
  <text x="60" y="90" fill="#9a3412" font-size="18">Deux entrées existent selon le workflow : Dashboard principal ou Zero Trust.</text>
  <g transform="translate(60 130)">
    <rect width="500" height="220" rx="24" fill="#ffffff" stroke="#fdba74"/>
    <text x="35" y="45" fill="#9a3412" font-size="24" font-weight="800">Dashboard principal</text>
    <text x="35" y="88" fill="#0f172a" font-size="20">Cloudflare Dashboard</text>
    <text x="35" y="126" fill="#0f172a" font-size="20">→ Networking</text>
    <text x="35" y="164" fill="#0f172a" font-size="20">→ Tunnels</text>
    <text x="35" y="202" fill="#64748b" font-size="16">Recommandé pour publier des applications publiques.</text>
  </g>
  <g transform="translate(640 130)">
    <rect width="500" height="220" rx="24" fill="#ffffff" stroke="#fdba74"/>
    <text x="35" y="45" fill="#9a3412" font-size="24" font-weight="800">Dashboard Zero Trust</text>
    <text x="35" y="88" fill="#0f172a" font-size="20">Zero Trust</text>
    <text x="35" y="126" fill="#0f172a" font-size="20">→ Networks</text>
    <text x="35" y="164" fill="#0f172a" font-size="20">→ Connectors</text>
    <text x="35" y="202" fill="#0f172a" font-size="20">→ Cloudflare Tunnels</text>
  </g>
</g>
</svg>
