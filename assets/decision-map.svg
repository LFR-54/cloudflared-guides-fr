<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
<title id="title">Quick Tunnel ou tunnel permanent</title>
<desc id="desc">Decision map to choose between quick and permanent tunnel</desc>
<rect width="1200" height="300" rx="28" fill="#0f172a"/>
<g font-family="Inter,Segoe UI,Arial,sans-serif">
  <text x="60" y="58" fill="#fff" font-size="30" font-weight="800">Choisir la méthode</text>
  <g transform="translate(65 95)">
    <rect width="500" height="150" rx="22" fill="#1d4ed8"/>
    <text x="250" y="45" text-anchor="middle" fill="#fff" font-size="28" font-weight="800">Quick Tunnel</text>
    <text x="250" y="82" text-anchor="middle" fill="#dbeafe" font-size="18">Test rapide • URL temporaire</text>
    <text x="250" y="114" text-anchor="middle" fill="#dbeafe" font-size="18">Pas de domaine personnalisé</text>
  </g>
  <g transform="translate(635 95)">
    <rect width="500" height="150" rx="22" fill="#f97316"/>
    <text x="250" y="45" text-anchor="middle" fill="#fff" font-size="28" font-weight="800">Tunnel permanent</text>
    <text x="250" y="82" text-anchor="middle" fill="#ffedd5" font-size="18">Usage durable • domaine propre</text>
    <text x="250" y="114" text-anchor="middle" fill="#ffedd5" font-size="18">Service Windows/Linux/Docker</text>
  </g>
</g>
</svg>
